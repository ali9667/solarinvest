name: Stale Issue Manager

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 9 AM UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark and Close Stale Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has had no activity for 30 days. It will be closed in 7 days
            unless there is new activity. Comment to keep it open or add the `pinned` label.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          exempt-issue-labels: "pinned,security,bug,in-progress"

          # PRs
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has had no activity for 14 days and will be closed in 7 days.
            Please rebase, resolve conflicts, and push an update to keep it open.
          close-pr-message: >
            Closing this PR due to inactivity. Feel free to reopen when you're ready.
          exempt-pr-labels: "pinned,do-not-close"
