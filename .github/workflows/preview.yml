name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    environment: preview

    permissions:
      pull-requests: write   # To post comments on the PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}/api

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy ./frontend/dist \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --confirm \
            --name=solarinvest-pr-${{ github.event.pull_request.number }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            const body = `## 🌐 Preview Deployment

            | | |
            |--|--|
            | **Preview URL** | ${{ steps.deploy.outputs.url }} |
            | **Commit** | \`${{ github.event.pull_request.head.sha }}\` |
            | **Branch** | \`${{ github.head_ref }}\` |

            Preview uses the staging API. Updated on every push to this PR.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
